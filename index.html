<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Guess The Number VS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 15px; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #4CAF50; margin-bottom: 10px; font-size: 1.8rem; }
        
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        input[type="text"], input[type="number"] { padding: 12px; font-size: 1.2rem; width: 100%; margin-bottom: 15px; border-radius: 8px; border: 2px solid #333; background: #222; color: #fff; text-align: center; text-transform: uppercase; box-sizing: border-box; }
        
        button { background-color: #4CAF50; color: white; border: none; padding: 15px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; margin-bottom: 15px; }
        button:active { transform: scale(0.95); background-color: #45a049; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; transform: none; }
        .btn-blue { background-color: #2196F3; }
        
        #setup-panel, #game-panel { display: none; width: 100%; max-width: 400px; }
        
        #status-msg { font-size: 1.1rem; font-weight: bold; min-height: 25px; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #222; color: #FFC107; }

        .secret-banner { background: #2196F3; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 1.1rem; }
        #my-secret-display { color: #fff; font-size: 1.5rem; background: rgba(0,0,0,0.2); padding: 2px 10px; border-radius: 6px; margin-left: 5px; letter-spacing: 2px; }

        .stacks-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stack-container { background: #1a1a1a; border-radius: 8px; padding: 8px; border: 1px solid #333; display: flex; flex-direction: column; }
        h3 { margin: 0 0 10px 0; color: #aaa; font-size: 0.85rem; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        
        .guess-stack { height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        .guess-item { padding: 8px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: popIn 0.3s ease; background-color: rgba(255, 255, 255, 0.05); border: 1px solid #444; }
        .guess-item .guess-number { font-size: 1.1rem; margin-bottom: 4px; color: #fff; }
        
        /* Digit Boxes for 3-4 digit guesses */
        .digit-box { display: inline-block; padding: 4px 6px; margin: 0 2px; border-radius: 4px; font-size: 1.1rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .digit-green { background-color: #4CAF50; border: 1px solid #2E7D32; }
        .digit-red { background-color: #F44336; border: 1px solid #C62828; }
        
        /* High/Low colors */
        .text-high { color: #ff8a80; background: rgba(244,67,54,0.2); padding: 2px 8px; border-radius: 4px; }
        .text-low { color: #80d8ff; background: rgba(33,150,243,0.2); padding: 2px 8px; border-radius: 4px; }
        .text-correct { color: #b9f6ca; background: rgba(76,175,80,0.2); padding: 2px 8px; border-radius: 4px; }

        @keyframes popIn { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }

        #restart-btn { background-color: #f44336; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Secret Code VS</h1>

    <div class="panel" id="lobby-panel">
        <button onclick="createRoom()">Create Room (Host)</button>
        <p style="margin: 15px 0; color: #aaa;">— OR —</p>
        <input type="text" id="room-code" placeholder="4-LETTER CODE" maxlength="4">
        <button onclick="joinRoom()" class="btn-blue">Join Friend</button>
        <p id="lobby-msg" style="color: #FFC107; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div class="panel" id="setup-panel">
        <div style="background: #333; padding: 8px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #aaa;">
            Room: <span id="room-display" style="letter-spacing: 2px; color: #fff;">---</span>
        </div>
        <h2 style="margin-top: 0;">Pick Your Code</h2>
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 15px;">Choose a number from 1 to 9999.</p>
        <input type="number" id="secret-input" placeholder="e.g. 4256" min="1" max="9999">
        <button id="lock-btn" onclick="lockSecret()">Lock In Code</button>
        <p id="setup-status" style="color: #FFC107; font-weight: bold;"></p>
    </div>

    <div id="game-panel">
        <div class="secret-banner">
            My Code: <span id="my-secret-display">?</span>
        </div>

        <div id="status-msg">Game Starting...</div>

        <div class="stacks-wrapper">
            <div class="stack-container">
                <h3>MY GUESSES</h3>
                <div id="my-guess-stack" class="guess-stack"></div>
            </div>
            <div class="stack-container">
                <h3>THEIR GUESSES</h3>
                <div id="opp-guess-stack" class="guess-stack"></div>
            </div>
        </div>

        <div class="panel" style="padding: 15px; box-sizing: border-box;">
            <input type="number" id="guess-input" placeholder="Guess (1-9999)" min="1" max="9999">
            <button id="guess-btn" onclick="sendGuess()">Submit Guess</button>
        </div>

        <button id="restart-btn" onclick="triggerRestart()">Play Again</button>
    </div>

    <script>
        let peer = null; let conn = null;
        let isHost = false; 
        
        let mySecret = null;
        let oppReady = false;
        let isMyTurn = false;
        let gameActive = false;

        const ui = {
            lobby: document.getElementById('lobby-panel'),
            setup: document.getElementById('setup-panel'),
            game: document.getElementById('game-panel'),
            lobbyMsg: document.getElementById('lobby-msg'),
            setupStatus: document.getElementById('setup-status'),
            status: document.getElementById('status-msg'),
            roomDisp: document.getElementById('room-display'),
            secretInput: document.getElementById('secret-input'),
            lockBtn: document.getElementById('lock-btn'),
            mySecretDisp: document.getElementById('my-secret-display'),
            guessInput: document.getElementById('guess-input'),
            guessBtn: document.getElementById('guess-btn'),
            myGuessStack: document.getElementById('my-guess-stack'),
            oppGuessStack: document.getElementById('opp-guess-stack'),
            restartBtn: document.getElementById('restart-btn')
        };

        // --- MULTIPLAYER LOBBY ---
        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let res = ''; for(let i=0; i<4; i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
            return res;
        }

        function createRoom() {
            isHost = true;
            ui.lobbyMsg.innerText = "Creating room...";
            const roomCode = generateCode();
            peer = new Peer('guess-' + roomCode); 
            peer.on('open', () => {
                ui.lobby.style.display = 'none'; ui.setup.style.display = 'block';
                ui.roomDisp.innerText = roomCode;
                ui.setupStatus.innerText = "Waiting for friend...";
            });
            peer.on('connection', (connection) => {
                conn = connection; setupConnection();
                ui.setupStatus.innerText = "Friend joined! Lock code.";
            });
        }

        function joinRoom() {
            const code = document.getElementById('room-code').value.toUpperCase();
            if(code.length !== 4) return alert("Enter 4-letter code!");
            isHost = false; ui.lobbyMsg.innerText = "Connecting...";
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect('guess-' + code);
                conn.on('open', () => {
                    ui.lobby.style.display = 'none'; ui.setup.style.display = 'block';
                    ui.roomDisp.innerText = code;
                    ui.setupStatus.innerText = "Connected! Lock code.";
                    setupConnection();
                });
            });
        }

        // --- GAME LOGIC ---
        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'READY') { oppReady = true; checkStartGame(); } 
                else if (data.type === 'GUESS') { handleOpponentGuess(data.val); }
                else if (data.type === 'RESULT') { handleGuessResult(data); }
                else if (data.type === 'RESTART') { resetGame(); }
            });
            conn.on('close', () => { ui.status.innerText = "Opponent disconnected!"; ui.guessBtn.disabled = true; });
        }

        function lockSecret() {
            const val = parseInt(ui.secretInput.value);
            if (isNaN(val) || val < 1 || val > 9999) return alert("Enter a number between 1 and 9999.");
            
            mySecret = val;
            ui.mySecretDisp.innerText = mySecret.toString().padStart(4, '0'); 
            
            ui.lockBtn.disabled = true; ui.secretInput.disabled = true;
            ui.setupStatus.innerText = "Locked! Waiting for opponent...";
            
            conn.send({ type: 'READY' });
            checkStartGame();
        }

        function checkStartGame() {
            if (mySecret !== null && oppReady) {
                ui.setup.style.display = 'none'; ui.game.style.display = 'block';
                gameActive = true;
                isMyTurn = isHost;
                updateTurnUI();
            }
        }

        function sendGuess() {
            if (!isMyTurn || !gameActive) return;
            const val = parseInt(ui.guessInput.value);
            if (isNaN(val) || val < 1 || val > 9999) return alert("Guess between 1 and 9999.");

            ui.guessInput.value = '';
            isMyTurn = false; updateTurnUI();
            
            conn.send({ type: 'GUESS', val: val });
        }

        // When opponent sends a guess, check it against our secret
        function handleOpponentGuess(guessNum) {
            let isWin = (guessNum === mySecret);
            let resultData = { type: 'RESULT', guess: guessNum, isWin: isWin, displayHtml: "" };

            if (isWin) {
                resultData.displayHtml = `<span class="text-correct">CORRECT! 🟢</span>`;
            } 
            else if (guessNum < 100) {
                // RULE 1: 1 or 2 digit guesses (High/Low Mode)
                if (guessNum > mySecret) resultData.displayHtml = `<span class="text-high">TOO HIGH 🔴</span>`;
                else resultData.displayHtml = `<span class="text-low">TOO LOW 🔵</span>`;
            } 
            else {
                // RULE 2: 3 or 4 digit guesses (Digit Scanner Mode)
                // We pad both numbers to 4 digits to align them perfectly
                let gStr = guessNum.toString().padStart(4, '0');
                let sStr = mySecret.toString().padStart(4, '0');
                let html = "<div>";
                
                for(let i = 0; i < 4; i++) {
                    if (gStr[i] === sStr[i]) {
                        html += `<span class="digit-box digit-green">${gStr[i]}</span>`;
                    } else {
                        html += `<span class="digit-box digit-red">${gStr[i]}</span>`;
                    }
                }
                html += "</div>";
                resultData.displayHtml = html;
            }

            conn.send(resultData);

            // Show their guess in our right-side stack
            addToStack(ui.oppGuessStack, guessNum, resultData.displayHtml);

            if (isWin) {
                gameActive = false;
                ui.status.innerText = `💥 THEY GUESSED IT! YOU LOSE!`;
                ui.status.style.color = "#F44336";
                ui.restartBtn.style.display = 'block';
            } else {
                isMyTurn = true; updateTurnUI();
            }
        }

        // When opponent sends the result of our guess back to us
        function handleGuessResult(data) {
            // Show in our left-side stack
            addToStack(ui.myGuessStack, data.guess, data.displayHtml);

            if (data.isWin) {
                gameActive = false;
                ui.status.innerText = `🎉 YOU GOT IT! YOU WIN!`;
                ui.status.style.color = "#4CAF50";
                ui.restartBtn.style.display = 'block';
            }
        }

        function addToStack(stackElement, number, htmlContent) {
            const item = document.createElement('div');
            item.className = 'guess-item';
            
            // Format: Number on top, Result on bottom
            item.innerHTML = `<span class="guess-number">${number}</span> ${htmlContent}`;
            
            stackElement.insertBefore(item, stackElement.firstChild);
        }

        function updateTurnUI() {
            if (!gameActive) { ui.guessBtn.disabled = true; return; }
            if (isMyTurn) {
                ui.status.innerText = "YOUR TURN! Enter a guess.";
                ui.status.style.color = "#4CAF50"; ui.guessBtn.disabled = false;
            } else {
                ui.status.innerText = "Opponent is thinking...";
                ui.status.style.color = "#aaa"; ui.guessBtn.disabled = true;
            }
        }

        function triggerRestart() { conn.send({ type: 'RESTART' }); resetGame(); }

        function resetGame() {
            mySecret = null; oppReady = false; gameActive = false; isHost = !isHost; 
            ui.myGuessStack.innerHTML = ''; ui.oppGuessStack.innerHTML = '';
            ui.mySecretDisp.innerText = '?'; ui.secretInput.value = '';
            ui.secretInput.disabled = false; ui.lockBtn.disabled = false;
            ui.restartBtn.style.display = 'none'; ui.game.style.display = 'none';
            ui.setup.style.display = 'block';
            ui.setupStatus.innerText = "New Match! Lock your new code.";
        }
    </script>
</body>
</html>
