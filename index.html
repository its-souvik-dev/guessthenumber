<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Guess The Number VS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 15px; text-align: center; margin: 0; touch-action: manipulation; }
        h1 { color: #4CAF50; margin-bottom: 10px; font-size: 1.8rem; }
        
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="text"], input[type="number"] { padding: 12px; font-size: 1.2rem; width: 100%; margin-bottom: 15px; border-radius: 8px; border: 2px solid #333; background: #222; color: #fff; text-align: center; text-transform: uppercase; box-sizing: border-box; }
        
        button { background-color: #4CAF50; color: white; border: none; padding: 15px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; margin-bottom: 15px; }
        button:active { transform: scale(0.95); background-color: #45a049; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; transform: none; }
        .btn-blue { background-color: #2196F3; }
        
        /* Game States */
        #setup-panel, #game-panel { display: none; width: 100%; max-width: 400px; }
        
        #status-msg { font-size: 1.1rem; font-weight: bold; min-height: 25px; margin-bottom: 15px; padding: 10px; border-radius: 8px; background: #222; color: #FFC107; }

        /* The Guess Stack */
        .stack-container { background: #1a1a1a; border-radius: 8px; padding: 10px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { margin: 0 0 10px 0; color: #aaa; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        #guess-stack { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        .guess-item { padding: 10px; border-radius: 6px; font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; animation: popIn 0.3s ease; }
        
        /* Colors for the stack */
        .guess-high { background-color: rgba(244, 67, 54, 0.2); border: 1px solid #F44336; color: #ff8a80; } /* RED */
        .guess-low { background-color: rgba(33, 150, 243, 0.2); border: 1px solid #2196F3; color: #80d8ff; } /* BLUE */
        .guess-correct { background-color: rgba(76, 175, 80, 0.2); border: 1px solid #4CAF50; color: #b9f6ca; } /* GREEN */
        .guess-opp { background-color: rgba(255, 255, 255, 0.1); border: 1px solid #555; color: #ccc; } /* GREY for opponent */

        @keyframes popIn { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }

        #restart-btn { background-color: #f44336; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Secret Number VS</h1>

    <div class="panel" id="lobby-panel">
        <button onclick="createRoom()">Create Room (Host)</button>
        <p style="margin: 15px 0; color: #aaa;">— OR —</p>
        <input type="text" id="room-code" placeholder="4-LETTER CODE" maxlength="4">
        <button onclick="joinRoom()" class="btn-blue">Join Friend</button>
        <p id="lobby-msg" style="color: #FFC107; font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div class="panel" id="setup-panel">
        <div style="background: #2196F3; padding: 8px; border-radius: 8px; margin-bottom: 15px; font-weight: bold;">
            Room: <span id="room-display" style="letter-spacing: 2px;">---</span>
        </div>
        <h2 style="margin-top: 0;">Pick Your Secret</h2>
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 15px;">Choose a number between 1 and 100.</p>
        <input type="number" id="secret-input" placeholder="e.g. 42" min="1" max="100">
        <button id="lock-btn" onclick="lockSecret()">Lock In Number</button>
        <p id="setup-status" style="color: #FFC107; font-weight: bold;"></p>
    </div>

    <div id="game-panel">
        <div id="status-msg">Game Starting...</div>

        <div class="stack-container">
            <h3>Your Guess History</h3>
            <div id="guess-stack">
                </div>
        </div>

        <div class="panel" style="padding: 15px;">
            <input type="number" id="guess-input" placeholder="Enter Guess (1-100)" min="1" max="100">
            <button id="guess-btn" onclick="sendGuess()">Submit Guess</button>
        </div>

        <button id="restart-btn" onclick="triggerRestart()">Play Again</button>
    </div>

    <script>
        let peer = null; let conn = null;
        let isHost = false; 
        
        // Game Variables
        let mySecret = null;
        let oppReady = false;
        let isMyTurn = false;
        let gameActive = false;

        const ui = {
            lobby: document.getElementById('lobby-panel'),
            setup: document.getElementById('setup-panel'),
            game: document.getElementById('game-panel'),
            lobbyMsg: document.getElementById('lobby-msg'),
            setupStatus: document.getElementById('setup-status'),
            status: document.getElementById('status-msg'),
            roomDisp: document.getElementById('room-display'),
            secretInput: document.getElementById('secret-input'),
            lockBtn: document.getElementById('lock-btn'),
            guessInput: document.getElementById('guess-input'),
            guessBtn: document.getElementById('guess-btn'),
            guessStack: document.getElementById('guess-stack'),
            restartBtn: document.getElementById('restart-btn')
        };

        // --- MULTIPLAYER LOBBY ---
        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let res = ''; for(let i=0; i<4; i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
            return res;
        }

        function createRoom() {
            isHost = true;
            ui.lobbyMsg.innerText = "Creating room...";
            const roomCode = generateCode();
            peer = new Peer('guess-' + roomCode); 

            peer.on('open', () => {
                ui.lobby.style.display = 'none'; 
                ui.setup.style.display = 'block';
                ui.roomDisp.innerText = roomCode;
                ui.setupStatus.innerText = "Waiting for friend to join...";
            });

            peer.on('connection', (connection) => {
                conn = connection; setupConnection();
                ui.setupStatus.innerText = "Friend joined! Lock in your number.";
            });
        }

        function joinRoom() {
            const code = document.getElementById('room-code').value.toUpperCase();
            if(code.length !== 4) return alert("Enter 4-letter code!");
            
            isHost = false;
            ui.lobbyMsg.innerText = "Connecting...";
            peer = new Peer();
            
            peer.on('open', () => {
                conn = peer.connect('guess-' + code);
                conn.on('open', () => {
                    ui.lobby.style.display = 'none'; 
                    ui.setup.style.display = 'block';
                    ui.roomDisp.innerText = code;
                    ui.setupStatus.innerText = "Connected! Lock in your number.";
                    setupConnection();
                });
            });
            peer.on('error', () => { ui.lobbyMsg.innerText = "Room not found!"; });
        }

        // --- GAME LOGIC ---
        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'READY') {
                    oppReady = true;
                    checkStartGame();
                } 
                else if (data.type === 'GUESS') {
                    handleOpponentGuess(data.val);
                }
                else if (data.type === 'RESULT') {
                    handleGuessResult(data.guess, data.status);
                }
                else if (data.type === 'RESTART') {
                    resetGame();
                }
            });
            conn.on('close', () => { 
                ui.status.innerText = "Opponent disconnected!"; 
                ui.guessBtn.disabled = true;
            });
        }

        function lockSecret() {
            const val = parseInt(ui.secretInput.value);
            if (isNaN(val) || val < 1 || val > 100) return alert("Enter a number between 1 and 100.");
            
            mySecret = val;
            ui.lockBtn.disabled = true;
            ui.secretInput.disabled = true;
            ui.setupStatus.innerText = "Secret locked! Waiting for opponent...";
            
            conn.send({ type: 'READY' });
            checkStartGame();
        }

        function checkStartGame() {
            if (mySecret !== null && oppReady) {
                ui.setup.style.display = 'none';
                ui.game.style.display = 'block';
                gameActive = true;
                
                // Host goes first
                isMyTurn = isHost;
                updateTurnUI();
            }
        }

        function sendGuess() {
            if (!isMyTurn || !gameActive) return;
            
            const val = parseInt(ui.guessInput.value);
            if (isNaN(val) || val < 1 || val > 100) return alert("Guess between 1 and 100.");

            ui.guessInput.value = '';
            isMyTurn = false;
            updateTurnUI();
            
            // Send guess to opponent to check
            conn.send({ type: 'GUESS', val: val });
        }

        // When opponent sends us a guess, we check it against our secret
        function handleOpponentGuess(guess) {
            let status = '';
            if (guess > mySecret) status = 'HIGH';
            else if (guess < mySecret) status = 'LOW';
            else status = 'CORRECT';

            // Tell them the result
            conn.send({ type: 'RESULT', guess: guess, status: status });

            // Show their guess in our stack (just for info)
            addToStack(guess, 'OPPONENT', 'guess-opp');

            if (status === 'CORRECT') {
                gameActive = false;
                ui.status.innerText = `💥 THEY GUESSED IT! Your secret was ${mySecret}. YOU LOSE!`;
                ui.status.style.color = "#F44336";
                ui.restartBtn.style.display = 'block';
            } else {
                isMyTurn = true;
                updateTurnUI();
            }
        }

        // When opponent tells us the result of our guess
        function handleGuessResult(guess, status) {
            if (status === 'HIGH') {
                addToStack(guess, 'TOO HIGH 🔴', 'guess-high');
            } else if (status === 'LOW') {
                addToStack(guess, 'TOO LOW 🔵', 'guess-low');
            } else if (status === 'CORRECT') {
                addToStack(guess, 'CORRECT! 🟢', 'guess-correct');
                gameActive = false;
                ui.status.innerText = `🎉 YOU GOT IT! Their secret was ${guess}. YOU WIN!`;
                ui.status.style.color = "#4CAF50";
                ui.restartBtn.style.display = 'block';
            }
        }

        function addToStack(number, text, cssClass) {
            const item = document.createElement('div');
            item.className = `guess-item ${cssClass}`;
            
            // Layout: [Number] --------- [Result]
            item.innerHTML = `<span>Number: ${number}</span> <span>${text}</span>`;
            
            // Insert at the top of the stack
            ui.guessStack.insertBefore(item, ui.guessStack.firstChild);
        }

        function updateTurnUI() {
            if (!gameActive) {
                ui.guessBtn.disabled = true;
                return;
            }
            if (isMyTurn) {
                ui.status.innerText = "YOUR TURN! Enter a guess.";
                ui.status.style.color = "#4CAF50";
                ui.guessBtn.disabled = false;
            } else {
                ui.status.innerText = "Opponent is thinking...";
                ui.status.style.color = "#aaa";
                ui.guessBtn.disabled = true;
            }
        }

        // --- RESTART LOGIC ---
        function triggerRestart() {
            conn.send({ type: 'RESTART' });
            resetGame();
        }

        function resetGame() {
            mySecret = null;
            oppReady = false;
            gameActive = false;
            
            // Loser goes first next game (if Host won, isHost is true, so joiner goes first)
            isHost = !isHost; 

            ui.guessStack.innerHTML = '';
            ui.secretInput.value = '';
            ui.secretInput.disabled = false;
            ui.lockBtn.disabled = false;
            ui.restartBtn.style.display = 'none';
            
            ui.game.style.display = 'none';
            ui.setup.style.display = 'block';
            ui.setupStatus.innerText = "New Match! Lock in your new secret number.";
        }
    </script>
</body>
</html>
